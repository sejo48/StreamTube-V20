<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MAGIS Tube</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; overflow: hidden; background: #0d1117; color: #fff; font-family: 'Inter', sans-serif; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

    @keyframes fadeIn  { from{opacity:0}to{opacity:1} }
    @keyframes slideUp { from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1} }
    @keyframes slideR  { from{transform:translateX(100%)}to{transform:translateX(0)} }
    @keyframes pulse   { 0%,100%{opacity:1}50%{opacity:.35} }
    @keyframes shake   { 0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)} }
    @keyframes shimmer { 0%{background-position:-800px 0}100%{background-position:800px 0} }
    @keyframes toast   { from{transform:translateX(-50%) translateY(12px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1} }

    .aFade { animation: fadeIn .4s ease-out; }
    .aUp   { animation: slideUp .5s ease-out; }
    .aR    { animation: slideR .3s cubic-bezier(.16,1,.3,1); }
    .aShake{ animation: shake .2s ease-in-out 2; }

    .shimmer {
      background: linear-gradient(90deg,#1c2230 25%,#252e3f 50%,#1c2230 75%);
      background-size: 800px 100%;
      animation: shimmer 1.4s infinite;
    }
    .dot {
      display: inline-block; width: 7px; height: 7px;
      border-radius: 50%; background: #E50914;
      animation: pulse 1.4s ease-in-out infinite; flex-shrink: 0;
    }
    .gold {
      background: linear-gradient(to right,#BF953F,#FCF6BA,#B38728,#FBF5B7,#AA771C);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    /* Player wrapper */
    .pw { position: relative; width: 100%; height: 100%; background: #000; }
    .pw iframe, .pw video { position: absolute; inset: 0; width: 100%; height: 100%; border: none; object-fit: contain; }

    /* Toast */
    .toast-el {
      position: fixed; bottom: 82px; left: 50%; transform: translateX(-50%);
      z-index: 500; animation: toast .3s ease-out;
      white-space: nowrap; border-radius: 99px;
      padding: 9px 20px; font-size: 13px; font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,0,0,.6);
    }

    /* Focus */
    button:focus-visible, input:focus-visible { outline: 2px solid #E50914; outline-offset: 2px; }

    /* pb safe area */
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 4px); }

    /* Load bar */
    .lbar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(to right,#E50914,#ff6535); z-index: 999; transition: width .3s; }

    /* Responsive helpers */
    .only-mobile { display: flex !important; }
    .only-desktop { display: none !important; }
    @media (min-width: 768px) {
      .only-mobile  { display: none !important; }
      .only-desktop { display: flex !important; }
    }
    .show-sm { display: block !important; }
    @media (min-width: 640px) { .hide-sm { display: none !important; } }

    /* Card hover overlay */
    .card-wrap:hover .card-overlay { opacity: 1; }
    .card-wrap:hover .card-play { transform: scale(1); }
    .card-overlay { opacity: 0; transition: opacity .2s; }
    .card-play { transform: scale(0); transition: transform .2s; }

    /* TV list item */
    .tv-row { transition: background .12s; }
    .tv-row:hover { background: rgba(255,255,255,.04) !important; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const cfg = JSON.parse(typeof __firebase_config!=='undefined'?__firebase_config:'{}');
  const appId = typeof __app_id!=='undefined'?__app_id:'magis-local';
  let db=null,auth=null,me=null;
  if(Object.keys(cfg).length){try{const a=initializeApp(cfg);auth=getAuth(a);db=getFirestore(a);onAuthStateChanged(auth,u=>me=u);signInAnonymously(auth).catch(()=>{});}catch(e){}}

  function localLoad(cb){
    const d=JSON.parse(localStorage.getItem('mgV')||'[]');
    d.sort((a,b)=>(b.ts||0)-(a.ts||0));
    cb(d.map(x=>({name:x.name,timestamp:{seconds:x.ts}})));
  }
  window.DB_API={
    saveVisitor:async n=>{
      if(!n)return;
      if(db&&me){try{await addDoc(collection(db,'artifacts',appId,'public','data','app_visitors'),{name:n,timestamp:serverTimestamp(),uid:me.uid});return;}catch(e){}}
      const a=JSON.parse(localStorage.getItem('mgV')||'[]');
      if(!a.some(v=>v.name===n&&Date.now()/1e3-v.ts<60)){a.push({name:n,ts:Date.now()/1e3});localStorage.setItem('mgV',JSON.stringify(a));}
    },
    subscribeToVisitors:cb=>{
      if(db){try{const q=query(collection(db,'artifacts',appId,'public','data','app_visitors'));return onSnapshot(q,s=>{const d=s.docs.map(doc=>({id:doc.id,...doc.data()}));d.sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0));cb(d);},()=>localLoad(cb));}catch(e){localLoad(cb);}}else localLoad(cb);
      return()=>{};
    }
  };
</script>

/* ─── Toast ─── */
const Toast=({msg,type,done})=>{
  useEffect(()=>{const t=setTimeout(done,2800);return()=>clearTimeout(t);},[]);
  const bg={ok:'#16a34a',fav:'#be185d',err:'#dc2626',info:'#1d4ed8'}[type]||'#1d4ed8';
  return <div className="toast-el" style={{background:bg}}>{msg}</div>;
};

/* ════════════════════════════
   APP PRINCIPAL
════════════════════════════ */
const App=()=>{
  const [intro,setIntro]     = useState(true);
  const [showQR,setShowQR]   = useState(false);
  const [showNotif,setShowNotif] = useState(false);
  const [showUsers,setShowUsers] = useState(false);
  const [showName,setShowName]   = useState(false);
  const [showAdmin,setShowAdmin] = useState(false);

  const [userName,setUserName] = useState('');
  const [tab,setTab]           = useState('home');
  const [data,setData]         = useState({tv:[],series:[],movies:[]});
  const [search,setSearch]     = useState('');
  const [dSearch,setDSearch]   = useState('');
  const [notifs,setNotifs]     = useState([]);
  const [nLoad,setNLoad]       = useState(true);
  const [unread,setUnread]     = useState(0);
  const [selItem,setSelItem]   = useState(null);
  const [selEp,setSelEp]       = useState(null);
  const [locked,setLocked]     = useState(false);
  const [favs,setFavs]         = useState([]);
  const [prog,setProg]         = useState({});
  const [loading,setLoading]   = useState(true);
  const [lPct,setLPct]         = useState(0);
  const [expS,setExpS]         = useState(0);
  const [toast,setToast]       = useState(null);
  // TV: en móvil, 'list' o 'player'
  const [tvView,setTvView]     = useState('list');

  const videoRef = useRef(null);
  const hlsRef   = useRef(null);
  const scrollRef= useRef(null);

  const pushToast=(msg,type)=>setToast({msg,type,id:Date.now()});

  /* Debounce */
  useEffect(()=>{const t=setTimeout(()=>setDSearch(search),280);return()=>clearTimeout(t);},[search]);

  /* Notifs */
  const fetchNotifs=async()=>{
    setNLoad(true);
    try{
      const r=await fetch(`https://ntfy.sh/${NTFY}/json?poll=1&since=all&t=${Date.now()}`);
      const txt=await r.text();
      const parsed=txt.trim().split('\n').map((l,i)=>{
        try{const d=JSON.parse(l);if(d.event!=='message')return null;
          let type='info';if(d.tags){if(d.tags.includes('warning')||d.tags.includes('error'))type='alert';else if(d.tags.includes('success')||d.tags.includes('check'))type='success';}
          return{id:d.id||i,date:new Date(d.time*1000).toLocaleDateString('es-MX',{day:'numeric',month:'short'}),title:d.title||'Aviso',message:d.message,type,time:d.time};}catch{return null;}
      }).filter(Boolean).reverse();
      setNotifs(parsed);
      const lrt=parseInt(S.get('mgLR')||'0');
      setUnread(parsed.filter(n=>n.time>lrt).length);
    }catch(e){console.error(e);}finally{setNLoad(false);}
  };
  useEffect(()=>{fetchNotifs();},[]);

  /* Init */
  useEffect(()=>{
    const init=async()=>{
      const n=S.get('mgName');if(n){setUserName(n);window.DB_API?.saveVisitor(n);}
      const f=S.get('mgFavs');if(f)setFavs(JSON.parse(f));
      const p=S.get('mgProg');if(p)setProg(JSON.parse(p));
      try{
        setLoading(true);setLPct(15);
        const [rT,rS,rM]=await Promise.all([fetch(URLS.TV),fetch(URLS.SE),fetch(URLS.MO)]);
        setLPct(55);
        const tT=await rT.text();const jS=await rS.json();const jM=await rM.json();
        setLPct(80);
        const tv=parseM3U(tT);
        const series=(Array.isArray(jS)?jS:[]).map(s=>({id:s.tituloSerie,title:s.tituloSerie||s.name,description:s.descripcion||s.description,image:s.imagen||s.image||s.poster,type:'series',codigo:s.codigo||s.password||s.pin||s.clave,seasons:(s.temporadas||[]).map(t=>({season_number:t.numeroTemporada||1,episodes:(t.episodios||[]).map(e=>({title:e.tituloEpisodio||e.title,url:cDrive(e.urlDrive||e.url),image:s.imagen}))}))}));
        const rawM=Array.isArray(jM)?jM:(jM.peliculas||[]);
        const movies=rawM.map(m=>({...m,type:'movie',title:m.titulo||m.title,image:m.imagen||m.poster,codigo:m.codigo||m.password||m.pin,url:cDrive(m.urlDrive||m.url)}));
        setData({tv,series,movies});setLPct(100);
      }catch(e){console.error(e);}finally{setLoading(false);setLPct(0);}
    };
    init();
  },[]);

  const cDrive=url=>{
    if(!url)return'';
    if(url.includes('drive.google.com')){if(url.includes('/preview'))return url;const m=url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);return m?`https://drive.google.com/file/d/${m[1]}/preview`:url;}
    return url;
  };
  const parseM3U=d=>{
    const lines=d.split('\n'),chs=[];
    for(let i=0;i<lines.length;i++){if(lines[i].trim().startsWith('#EXTINF:')){const url=lines[i+1]?.trim();if(url&&url.startsWith('http')){const inf=lines[i];chs.push({id:`tv-${i}`,title:inf.split(',')[1]?.trim()||'Canal',image:inf.match(/tvg-logo="([^"]*)"/)?.[1],group:inf.match(/group-title="([^"]*)"/)?.[1]||'General',url,type:'tv'});}}}
    return chs;
  };

  const handleIntroEnd=()=>{setIntro(false);const n=S.get('mgName');if(!n)setShowName(true);else{setUserName(n);window.DB_API?.saveVisitor(n);}};
  const handleSaveName=n=>{S.set('mgName',n);setUserName(n);setShowName(false);window.DB_API?.saveVisitor(n);pushToast(`¡Bienvenido/a, ${n}! 👋`,'ok');};
  const toggleFav=item=>{
    const id=item.id||item.title;const had=favs.some(f=>(f.id||f.title)===id);
    const nf=had?favs.filter(f=>(f.id||f.title)!==id):[item,...favs];
    setFavs(nf);S.set('mgFavs',JSON.stringify(nf));
    pushToast(had?'❌ Quitado de favoritos':'❤️ Guardado en favoritos','fav');
  };
  const playItem=item=>{
    const code=item.codigo||item.password||item.pin;
    setSelItem(item);setLocked(!!code);setExpS(0);
    if(item.type==='series'){const fe=item.seasons?.[0]?.episodes?.[0];setSelEp(fe||null);}
    if(item.type==='tv')setTvView('player');
    scrollRef.current?.scrollTo({top:0,behavior:'smooth'});
  };

  const playUrl=selItem?.type==='tv'||selItem?.type==='movie'?selItem.url:selItem?.type==='series'&&selEp?selEp.url:'';
  const isDrive=playUrl?.includes('drive.google.com');

  useEffect(()=>{
    if(locked||!playUrl||isDrive||!videoRef.current)return;
    const v=videoRef.current;
    if(hlsRef.current){hlsRef.current.destroy();hlsRef.current=null;}
    const id=selItem?.id||selItem?.title;const saved=prog[id];
    const onMeta=()=>{if(saved&&saved.time>0&&saved.pct<95)v.currentTime=saved.time;};
    v.addEventListener('loadedmetadata',onMeta);
    if(Hls.isSupported()&&(playUrl.includes('.m3u8')||selItem?.type==='tv')){const hls=new Hls();hlsRef.current=hls;hls.loadSource(playUrl);hls.attachMedia(v);hls.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));}
    else{v.src=playUrl;v.load();v.play().catch(()=>{});}
    return()=>v.removeEventListener('loadedmetadata',onMeta);
  },[playUrl,isDrive,selItem,locked]);

  const onVidProg=e=>{
    const{currentTime:t,duration:d}=e.target;if(!d||!selItem)return;
    const pct=(t/d)*100,id=selItem.id||selItem.title;
    const np={...prog,[id]:{pct,time:t,item:selItem,timestamp:Date.now()}};
    setProg(np);S.set('mgProg',JSON.stringify(np));
  };
  const markRead=()=>{const now=Math.floor(Date.now()/1e3);S.set('mgLR',String(now));setUnread(0);};

  const goTab=t=>{setTab(t);setSelItem(null);setSearch('');setLocked(false);setTvView('list');};

  const displayItems=useMemo(()=>{
    let list=tab==='home'?[...data.movies.slice(0,20),...data.series.slice(0,20),...data.tv.slice(0,20)]
      :tab==='favorites'?favs:data[tab]||[];
    if(dSearch)list=list.filter(i=>(i.title||i.name||'').toLowerCase().includes(dSearch.toLowerCase()));
    return list;
  },[tab,data,favs,dSearch]);

  const contW=useMemo(()=>{
    if(tab!=='home'||dSearch)return[];
    return Object.values(prog).filter(p=>p.pct>1&&p.pct<95&&p.item).sort((a,b)=>b.timestamp-a.timestamp).slice(0,10).map(p=>p.item);
  },[prog,tab,dSearch]);

  const heroItem=useMemo(()=>data.movies.length?data.movies[Math.floor(Math.random()*Math.min(data.movies.length,8))]:data.series[0],[data]);
  const filteredTV=useMemo(()=>dSearch?data.tv.filter(c=>c.title.toLowerCase().includes(dSearch.toLowerCase())):data.tv,[data.tv,dSearch]);

  const TABS=[{id:'home',ic:'home',lb:'Inicio'},{id:'series',ic:'film',lb:'Series'},{id:'movies',ic:'clap',lb:'Cine'},{id:'tv',ic:'tv',lb:'TV'},{id:'favorites',ic:'heart',lb:'Favs'}];
  const isTV=tab==='tv'||(selItem&&selItem.type==='tv');

  if(intro)return <IntroScreen onEnter={handleIntroEnd}/>;

  /* ──────────────── RENDER ──────────────── */
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden',background:'#0d1117',position:'relative'}}>

      {/* Load bar */}
      {lPct>0&&lPct<100&&<div className="lbar" style={{width:`${lPct}%`}}/>}

      {/* Toast */}
      {toast&&<Toast key={toast.id} msg={toast.msg} type={toast.type} done={()=>setToast(null)}/>}

      {/* Modals */}
      {showName  &&<NameModal onSave={handleSaveName}/>}
      {showUsers &&<UserListModal onClose={()=>setShowUsers(false)}/>}
      {showQR    &&<QRModal onClose={()=>setShowQR(false)}/>}
      {showNotif &&<NotifPanel items={notifs} loading={nLoad} onClose={()=>setShowNotif(false)} onRefresh={fetchNotifs} unread={unread} onMarkRead={markRead}/>}
      {showAdmin &&<AdminModal onClose={()=>setShowAdmin(false)} onSent={fetchNotifs}/>}

      {/* ─── LAYOUT ─── */}
      <div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>

        {/* ══ SIDEBAR DESKTOP ══ */}
        <aside className="only-desktop" style={{width:68,flexShrink:0,flexDirection:'column',alignItems:'center',padding:'18px 0',background:'#080b10',borderRight:'1px solid rgba(255,255,255,.05)',overflowY:'auto'}}>
          {/* Logo */}
          <button onClick={()=>goTab('home')} style={{marginBottom:22,background:'#E50914',border:'none',borderRadius:12,width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
            <IC n="play" s={19} f="white"/>
          </button>
          {/* Tabs */}
          <div style={{display:'flex',flexDirection:'column',width:'100%',gap:2,padding:'0 6px'}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>goTab(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3,padding:'9px 4px',border:'none',cursor:'pointer',borderRadius:10,background:tab===t.id?'rgba(229,9,20,.12)':'transparent',color:tab===t.id?'#E50914':'#6b7280',transition:'all .15s'}}>
                <IC n={t.ic} s={19} f={tab===t.id&&t.id==='favorites'?'currentColor':'none'}/>
                <span style={{fontSize:8,fontWeight:700,textTransform:'uppercase',letterSpacing:.5}}>{t.lb}</span>
              </button>
            ))}
          </div>
          {/* Footer */}
          <div style={{marginTop:'auto',display:'flex',flexDirection:'column',alignItems:'center',gap:10,padding:'14px 0 10px'}}>
            <button onClick={()=>setShowUsers(true)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#6b7280',display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <IC n="users" s={17}/><span style={{fontSize:8,fontWeight:700,textTransform:'uppercase',color:'#6b7280'}}>Visitas</span>
            </button>
            <button onClick={()=>setShowAdmin(true)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#eab308',display:'flex'}}><IC n="crown" s={17}/></button>
            <button onClick={()=>setShowNotif(true)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#9ca3af',position:'relative',display:'flex'}}>
              <IC n="bell" s={17}/>
              {unread>0&&<span style={{position:'absolute',top:-3,right:-3,background:'#E50914',color:'#fff',borderRadius:'50%',width:14,height:14,fontSize:8,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}}>{unread}</span>}
            </button>
            <button onClick={()=>setShowQR(true)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#60a5fa',display:'flex'}}><IC n="share" s={17}/></button>
            <div style={{width:30,height:30,borderRadius:'50%',background:'linear-gradient(135deg,#E50914,#ff6535)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:12,border:'2px solid rgba(255,255,255,.1)',flexShrink:0}}>
              {userName?userName[0].toUpperCase():'J'}
            </div>
          </div>
        </aside>

        {/* ══ ÁREA PRINCIPAL ══ */}
        <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>

          {/* ── Header móvil (oculto cuando TV está reproduciendo en móvil) ── */}
          {!(isTV&&tvView==='player')&&(
            <header className="only-mobile" style={{alignItems:'center',justifyContent:'space-between',padding:'10px 12px',background:'rgba(13,17,23,.97)',backdropFilter:'blur(10px)',borderBottom:'1px solid rgba(255,255,255,.05)',flexShrink:0,zIndex:40}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:27,height:27,background:'#E50914',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><IC n="play" s={13} f="white"/></div>
                <span style={{fontFamily:'Bebas Neue,sans-serif',fontSize:20,letterSpacing:1}}><span style={{color:'#E50914'}}>MAGIS</span>Tube</span>
              </div>
              <div style={{display:'flex',gap:2,alignItems:'center'}}>
                <button onClick={()=>setShowAdmin(true)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#eab308',padding:'6px',display:'flex'}}><IC n="crown" s={19}/></button>
                <button onClick={()=>setShowUsers(true)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#9ca3af',padding:'6px',display:'flex'}}><IC n="users" s={19}/></button>
                <button onClick={()=>setShowNotif(true)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#9ca3af',padding:'6px',position:'relative',display:'flex'}}>
                  <IC n="bell" s={19}/>
                  {unread>0&&<span style={{position:'absolute',top:3,right:3,background:'#E50914',color:'#fff',borderRadius:'50%',width:12,height:12,fontSize:8,fontWeight:900,display:'flex',alignItems:'center',justifyContent:'center'}}>{unread}</span>}
                </button>
                <button onClick={()=>window.open(`https://wa.me/?text=${encodeURIComponent('¡Mira esta app! '+window.location.href)}`,'_blank')} style={{background:'transparent',border:'none',cursor:'pointer',color:'#4ade80',padding:'6px',display:'flex'}}><IC n="wa" s={19}/></button>
                <button onClick={()=>setShowQR(true)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#60a5fa',padding:'6px',display:'flex'}}><IC n="share" s={19}/></button>
              </div>
            </header>
          )}

          {/* ══════════════════════════════════
              SECCIÓN TV  — mobile-first
          ══════════════════════════════════ */}
          {isTV?(
            <>
              {/* ── DESKTOP: 2 columnas ── */}
              <div className="only-desktop" style={{flex:1,overflow:'hidden'}}>
                <div style={{display:'flex',height:'100%'}}>
                  {/* Reproductor */}
                  <div style={{flex:1,background:'#000',display:'flex',flexDirection:'column',overflow:'hidden',position:'relative',minWidth:0}}>
                    {selItem&&selItem.type==='tv'&&!locked?(
                      <div style={{flex:1,position:'relative'}}>
                        {isDrive?<div className="pw" style={{position:'absolute',inset:0}}><iframe src={playUrl} allow="autoplay;encrypted-media;fullscreen" allowFullScreen/></div>
                        :<video ref={videoRef} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'contain'}} controls autoPlay playsInline onTimeUpdate={onVidProg}/>}
                        <div style={{position:'absolute',bottom:0,left:0,right:0,padding:'12px 18px',background:'linear-gradient(to top,rgba(0,0,0,.85),transparent)',pointerEvents:'none'}}>
                          <div style={{display:'flex',alignItems:'center',gap:10}}>
                            {selItem.image&&<img src={selItem.image} style={{height:26,maxWidth:52,objectFit:'contain',background:'rgba(0,0,0,.4)',borderRadius:4,padding:2}} alt=""/>}
                            <div>
                              <div style={{fontWeight:800,fontSize:15}}>{selItem.title}</div>
                              <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'#E50914',fontWeight:700}}><span className="dot"/>EN VIVO · {selItem.group}</div>
                            </div>
                          </div>
                        </div>
                      </div>
                    ):(
                      <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:18,padding:40,textAlign:'center'}}>
                        <div style={{width:90,height:90,borderRadius:'50%',background:'rgba(229,9,20,.07)',border:'1px solid rgba(229,9,20,.2)',display:'flex',alignItems:'center',justifyContent:'center',position:'relative'}}>
                          <IC n="tv" s={40} c="text-red-500"/>
                          <span className="dot" style={{position:'absolute',top:6,right:6}}/>
                        </div>
                        <div><h3 style={{fontSize:20,fontWeight:900,marginBottom:5}}>TV en Vivo</h3><p style={{fontSize:13,color:'#6b7280'}}>Selecciona un canal de la lista →</p></div>
                        <div style={{display:'flex',gap:24}}>
                          <div style={{textAlign:'center'}}><div style={{fontSize:26,fontWeight:900,color:'#E50914'}}>{data.tv.length}</div><div style={{fontSize:11,color:'#6b7280'}}>Canales</div></div>
                          <div style={{textAlign:'center'}}><div style={{fontSize:26,fontWeight:900,color:'#eab308'}}>{favs.filter(f=>f.type==='tv').length}</div><div style={{fontSize:11,color:'#6b7280'}}>Favoritos</div></div>
                        </div>
                        {favs.filter(f=>f.type==='tv').length>0&&(
                          <div style={{maxWidth:420}}>
                            <div style={{fontSize:10,color:'#4b5563',textTransform:'uppercase',letterSpacing:2,marginBottom:10}}>Acceso rápido</div>
                            <div style={{display:'flex',flexWrap:'wrap',gap:8,justifyContent:'center'}}>
                              {favs.filter(f=>f.type==='tv').slice(0,8).map(ch=>(
                                <button key={ch.id} onClick={()=>playItem(ch)} style={{background:'#1c2230',border:'1px solid rgba(255,255,255,.06)',borderRadius:10,padding:'8px 12px',cursor:'pointer',display:'flex',alignItems:'center',gap:6,color:'#d1d5db',fontSize:12,fontWeight:500}}>
                                  {ch.image&&<img src={ch.image} style={{width:26,height:16,objectFit:'contain'}} alt=""/>}
                                  <span>{ch.title}</span>
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                  {/* Lista */}
                  <div style={{width:295,flexShrink:0,background:'#0a0e13',borderLeft:'1px solid rgba(255,255,255,.05)',display:'flex',flexDirection:'column',overflow:'hidden'}}>
                    <div style={{padding:'12px 13px',borderBottom:'1px solid rgba(255,255,255,.05)',flexShrink:0}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:9}}>
                        <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:1,color:'#9ca3af'}}><span className="dot"/>Canales</div>
                        <span style={{fontSize:10,color:'#4b5563',background:'rgba(255,255,255,.05)',padding:'2px 7px',borderRadius:99}}>{filteredTV.length}</span>
                      </div>
                      <div style={{position:'relative'}}>
                        <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar..." style={{width:'100%',background:'#1c2230',border:'1px solid rgba(255,255,255,.08)',borderRadius:10,padding:'8px 12px 8px 32px',fontSize:13,color:'#fff',outline:'none'}}/>
                        <IC n="search" s={13} c="text-gray-500" style={{position:'absolute',left:9,top:9}}/>
                        {search&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:8,top:8,background:'transparent',border:'none',cursor:'pointer',color:'#6b7280',display:'flex'}}><IC n="x" s={13}/></button>}
                      </div>
                    </div>
                    <div style={{flex:1,overflowY:'auto'}}>
                      {loading?<div style={{padding:28,textAlign:'center',color:'#6b7280',fontSize:12}}>Cargando...</div>
                      :filteredTV.map(ch=><TvRow key={ch.id} ch={ch} isActive={selItem?.id===ch.id} isFav={favs.some(f=>f.id===ch.id)} onPlay={playItem} onToggleFav={toggleFav}/>)}
                    </div>
                  </div>
                </div>
              </div>

              {/* ══════════════════════════════════
                  MÓVIL TV — diseño nativo app
              ══════════════════════════════════ */}
              <div className="only-mobile" style={{flex:1,flexDirection:'column',overflow:'hidden',background:'#0d1117'}}>

                {tvView==='list'?(
                  /* ── VISTA LISTA MÓVIL ── */
                  <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

                    {/* Header lista con búsqueda */}
                    <div style={{padding:'10px 14px 10px',background:'#0a0e13',borderBottom:'1px solid rgba(255,255,255,.06)',flexShrink:0}}>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <span className="dot"/>
                          <span style={{fontWeight:900,fontSize:15,letterSpacing:.5}}>TV EN VIVO</span>
                        </div>
                        <span style={{fontSize:11,background:'rgba(229,9,20,.12)',color:'#E50914',padding:'2px 9px',borderRadius:99,fontWeight:700}}>{filteredTV.length}</span>
                      </div>
                      <div style={{position:'relative'}}>
                        <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar canal..." style={{width:'100%',background:'#1c2230',border:'1px solid rgba(255,255,255,.08)',borderRadius:12,padding:'11px 14px 11px 38px',fontSize:14,color:'#fff',outline:'none'}}/>
                        <IC n="search" s={15} c="text-gray-500" style={{position:'absolute',left:12,top:12}}/>
                        {search&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:11,top:11,background:'transparent',border:'none',cursor:'pointer',color:'#6b7280',display:'flex'}}><IC n="x" s={15}/></button>}
                      </div>
                    </div>

                    {/* Favoritos TV — carrusel horizontal si hay */}
                    {!search && favs.filter(f=>f.type==='tv').length>0&&(
                      <div style={{flexShrink:0,borderBottom:'1px solid rgba(255,255,255,.05)',background:'#0d1117'}}>
                        <div style={{padding:'9px 14px 4px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:1.2,color:'#6b7280',display:'flex',alignItems:'center',gap:6}}>
                          <IC n="heart" s={11} f="#E50914" c="text-red-500"/> Mis canales
                        </div>
                        <div style={{display:'flex',gap:10,overflowX:'auto',padding:'6px 14px 12px',scrollbarWidth:'none'}}>
                          {favs.filter(f=>f.type==='tv').map(ch=>(
                            <button key={ch.id} onClick={()=>playItem(ch)}
                              style={{flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',gap:5,background: selItem?.id===ch.id?'rgba(229,9,20,.15)':'rgba(255,255,255,.04)',border:`1px solid ${selItem?.id===ch.id?'rgba(229,9,20,.5)':'rgba(255,255,255,.07)'}`,borderRadius:12,padding:'8px 10px',cursor:'pointer',minWidth:64,maxWidth:72}}>
                              <div style={{width:44,height:30,background:'#0d1117',borderRadius:7,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid rgba(255,255,255,.08)'}}>
                                {ch.image?<img src={ch.image} style={{width:'100%',height:'100%',objectFit:'contain'}} onError={e=>e.target.style.display='none'} alt=""/>:<IC n="tv" s={16} c="text-gray-600"/>}
                              </div>
                              <span style={{fontSize:9,color:'#d1d5db',textAlign:'center',lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',width:'100%',fontWeight:600}}>{ch.title}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Lista scrolleable */}
                    <div style={{flex:1,overflowY:'auto'}}>
                      {loading?(
                        Array.from({length:10}).map((_,i)=>(
                          <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderBottom:'1px solid rgba(255,255,255,.03)'}}>
                            <div className="shimmer" style={{width:48,height:32,borderRadius:8,flexShrink:0}}/>
                            <div style={{flex:1}}>
                              <div className="shimmer" style={{height:12,borderRadius:4,marginBottom:6,width:'55%'}}/>
                              <div className="shimmer" style={{height:10,borderRadius:4,width:'38%'}}/>
                            </div>
                          </div>
                        ))
                      ):filteredTV.length===0?(
                        <div style={{textAlign:'center',padding:'50px 20px',color:'#6b7280',display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
                          <IC n="search" s={36} c="text-gray-700"/>
                          <div style={{fontSize:14,fontWeight:600}}>Sin resultados</div>
                          <div style={{fontSize:12}}>Prueba otro término</div>
                        </div>
                      ):(
                        filteredTV.map(ch=>(
                          <div key={ch.id} onClick={()=>playItem(ch)}
                            style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderBottom:'1px solid rgba(255,255,255,.04)',cursor:'pointer',background:selItem?.id===ch.id?'rgba(229,9,20,.07)':'transparent',borderLeft:`3px solid ${selItem?.id===ch.id?'#E50914':'transparent'}`,transition:'background .12s'}}>
                            {/* Logo canal */}
                            <div style={{width:52,height:34,background:'#000',borderRadius:8,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:'1px solid rgba(255,255,255,.07)'}}>
                              {ch.image?<img src={ch.image} style={{width:'100%',height:'100%',objectFit:'contain',padding:3}} onError={e=>e.target.style.display='none'} alt=""/>:<IC n="tv" s={16} c="text-gray-600"/>}
                            </div>
                            {/* Info */}
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontWeight:700,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:selItem?.id===ch.id?'#E50914':'#f3f4f6'}}>{ch.title}</div>
                              <div style={{fontSize:11,color:'#6b7280',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ch.group||'General'}</div>
                            </div>
                            {/* Botones derecha */}
                            <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                              <button onClick={e=>{e.stopPropagation();toggleFav(ch);}} style={{background:'transparent',border:'none',cursor:'pointer',padding:6,display:'flex'}}>
                                <IC n="heart" s={17} f={favs.some(f=>f.id===ch.id)?'#E50914':'none'} c={favs.some(f=>f.id===ch.id)?'text-red-500':'text-gray-600'}/>
                              </button>
                              {selItem?.id===ch.id&&<span className="dot" style={{width:6,height:6}}/>}
                            </div>
                          </div>
                        ))
                      )}
                      {/* Espaciado bottom nav */}
                      <div style={{height:16}}/>
                    </div>
                  </div>

                ):(
                  /* ══════════════════════════════════
                     VISTA PLAYER MÓVIL — app nativa
                  ══════════════════════════════════ */
                  <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#000'}}>

                    {/* Barra superior — canal activo */}
                    <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',background:'#0a0e13',borderBottom:'1px solid rgba(255,255,255,.07)',flexShrink:0,minHeight:52}}>
                      <button onClick={()=>{setTvView('list');}}
                        style={{width:38,height:38,borderRadius:10,background:'rgba(255,255,255,.07)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#fff',flexShrink:0}}>
                        <IC n="back" s={19}/>
                      </button>
                      {selItem?.image&&(
                        <div style={{width:48,height:30,background:'#000',borderRadius:6,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:'1px solid rgba(255,255,255,.1)'}}>
                          <img src={selItem.image} style={{width:'100%',height:'100%',objectFit:'contain',padding:2}} onError={e=>e.target.style.display='none'} alt=""/>
                        </div>
                      )}
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontWeight:800,fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{selItem?.title}</div>
                        <div style={{display:'flex',alignItems:'center',gap:5,marginTop:1}}>
                          <span className="dot" style={{width:5,height:5}}/>
                          <span style={{fontSize:10,color:'#E50914',fontWeight:700,textTransform:'uppercase',letterSpacing:.5}}>EN VIVO</span>
                          {selItem?.group&&<span style={{fontSize:10,color:'#6b7280'}}>· {selItem.group}</span>}
                        </div>
                      </div>
                      <button onClick={()=>toggleFav(selItem)}
                        style={{width:36,height:36,borderRadius:9,background:'rgba(255,255,255,.06)',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0}}>
                        <IC n="heart" s={18} f={favs.some(f=>f.id===selItem?.id)?'#E50914':'none'} c={favs.some(f=>f.id===selItem?.id)?'text-red-500':'text-gray-500'}/>
                      </button>
                    </div>

                    {/* Video 16:9 — grande y prominente */}
                    <div style={{width:'100%',position:'relative',flexShrink:0,background:'#000',aspectRatio:'16/9'}}>
                      {locked?(
                        <LockScreen code={selItem.codigo||selItem.password||selItem.pin} onUnlock={()=>setLocked(false)} onCancel={()=>{setTvView('list');setSelItem(null);setLocked(false);}}/>
                      ):isDrive?(
                        <div className="pw"><iframe src={playUrl} allow="autoplay;encrypted-media;fullscreen" allowFullScreen/></div>
                      ):(
                        <video ref={videoRef} style={{width:'100%',height:'100%',objectFit:'contain'}} controls autoPlay playsInline onTimeUpdate={onVidProg}/>
                      )}
                    </div>

                    {/* Panel inferior — lista de canales con búsqueda */}
                    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#0d1117'}}>

                      {/* Sub-header sticky */}
                      <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 12px',background:'#0a0e13',borderBottom:'1px solid rgba(255,255,255,.05)',flexShrink:0,position:'sticky',top:0,zIndex:5}}>
                        <span style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:1.2,color:'#9ca3af',display:'flex',alignItems:'center',gap:5,flex:1}}>
                          <span className="dot" style={{width:5,height:5}}/> Más canales
                        </span>
                        {/* Búsqueda inline compacta */}
                        <div style={{position:'relative',flex:1,maxWidth:160}}>
                          <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar..." style={{width:'100%',background:'#1c2230',border:'1px solid rgba(255,255,255,.07)',borderRadius:8,padding:'5px 10px 5px 27px',fontSize:12,color:'#fff',outline:'none'}}/>
                          <IC n="search" s={12} c="text-gray-500" style={{position:'absolute',left:8,top:7}}/>
                          {search&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:7,top:6,background:'transparent',border:'none',cursor:'pointer',color:'#6b7280',display:'flex'}}><IC n="x" s={12}/></button>}
                        </div>
                      </div>

                      {/* Lista scrolleable de canales */}
                      <div style={{flex:1,overflowY:'auto'}}>
                        {filteredTV.map(ch=>(
                          <div key={ch.id} onClick={()=>playItem(ch)}
                            style={{display:'flex',alignItems:'center',gap:10,padding:'9px 12px',borderBottom:'1px solid rgba(255,255,255,.03)',cursor:'pointer',background:selItem?.id===ch.id?'rgba(229,9,20,.08)':'transparent',borderLeft:`2px solid ${selItem?.id===ch.id?'#E50914':'transparent'}`,transition:'background .1s'}}>
                            <div style={{width:40,height:26,background:'#000',borderRadius:6,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,border:'1px solid rgba(255,255,255,.06)'}}>
                              {ch.image?<img src={ch.image} style={{width:'100%',height:'100%',objectFit:'contain',padding:2}} onError={e=>e.target.style.display='none'} alt=""/>:<IC n="tv" s={12} c="text-gray-600"/>}
                            </div>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:selItem?.id===ch.id?700:500,color:selItem?.id===ch.id?'#E50914':'#e5e7eb',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ch.title}</div>
                              <div style={{fontSize:10,color:'#6b7280',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ch.group||'General'}</div>
                            </div>
                            <div style={{display:'flex',alignItems:'center',gap:3,flexShrink:0}}>
                              <button onClick={e=>{e.stopPropagation();toggleFav(ch);}} style={{background:'transparent',border:'none',cursor:'pointer',padding:'4px',display:'flex'}}>
                                <IC n="heart" s={15} f={favs.some(f=>f.id===ch.id)?'#E50914':'none'} c={favs.some(f=>f.id===ch.id)?'text-red-500':'text-gray-700'}/>
                              </button>
                              {selItem?.id===ch.id&&<span className="dot" style={{width:5,height:5}}/>}
                            </div>
                          </div>
                        ))}
                        <div style={{height:16}}/>
                      </div>
                    </div>

                  </div>
                )}
              </div>
            </>

          ):selItem?(
            /* ══════════════════════════════════
               DETALLE / REPRODUCTOR Película o Serie
            ══════════════════════════════════ */
            <div ref={scrollRef} style={{flex:1,overflowY:'auto'}} className="aFade">
              {/* Player */}
              <div style={{position:'relative',width:'100%',background:'#000',aspectRatio:'16/9',maxHeight:'70vh'}}>
                <button onClick={()=>{setSelItem(null);setLocked(false);}} style={{position:'absolute',top:10,left:10,zIndex:30,display:'flex',alignItems:'center',gap:6,background:'rgba(0,0,0,.65)',backdropFilter:'blur(8px)',border:'1px solid rgba(255,255,255,.1)',borderRadius:9,padding:'6px 12px',color:'#fff',cursor:'pointer',fontSize:13,fontWeight:600}}>
                  <IC n="back" s={14}/>Volver
                </button>
                {locked?(
                  <LockScreen code={selItem.codigo||selItem.password||selItem.pin} onUnlock={()=>setLocked(false)} onCancel={()=>{setSelItem(null);setLocked(false);}}/>
                ):isDrive?(
                  <div className="pw" style={{position:'absolute',inset:0}}>
                    <iframe src={playUrl} allow="autoplay;encrypted-media;fullscreen" allowFullScreen/>
                    <a href={playUrl} target="_blank" rel="noopener noreferrer" style={{position:'absolute',top:10,right:10,zIndex:50,display:'flex',alignItems:'center',gap:5,background:'rgba(0,0,0,.7)',backdropFilter:'blur(6px)',border:'1px solid rgba(255,255,255,.15)',borderRadius:8,padding:'6px 10px',color:'#fff',fontSize:11,fontWeight:600,textDecoration:'none'}}>
                      <IC n="ext" s={12}/>Abrir
                    </a>
                  </div>
                ):(
                  <video ref={videoRef} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'contain'}} controls autoPlay playsInline onTimeUpdate={onVidProg}/>
                )}
                {selItem.type==='series'&&!selEp&&!locked&&(
                  <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.75)',display:'flex',alignItems:'center',justifyContent:'center',pointerEvents:'none',zIndex:5}}>
                    <span style={{background:'rgba(0,0,0,.7)',padding:'9px 16px',borderRadius:99,fontSize:13,color:'#9ca3af'}}>👇 Selecciona un episodio</span>
                  </div>
                )}
              </div>

              {!locked&&(
                <div style={{padding:'16px 16px 100px',maxWidth:900,margin:'0 auto'}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:14}}>
                    <div style={{flex:1,minWidth:0}}>
                      <h1 style={{fontSize:'clamp(17px,3.5vw,26px)',fontWeight:900,marginBottom:6,lineHeight:1.2}}>{selItem.title||selItem.name}</h1>
                      <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
                        <span style={{background:'rgba(255,255,255,.07)',borderRadius:6,padding:'3px 9px',fontSize:11,fontWeight:700,color:'#9ca3af',textTransform:'uppercase'}}>{selItem.type==='movie'?'🎬 Película':'📺 Serie'}</span>
                        {selItem.type==='series'&&selEp&&<span style={{color:'#E50914',fontSize:12,fontWeight:600}}>▶ {selEp.title}</span>}
                      </div>
                    </div>
                    <button onClick={()=>toggleFav(selItem)} style={{background:'#1c2230',border:'1px solid rgba(255,255,255,.08)',borderRadius:10,padding:'9px',cursor:'pointer',display:'flex',flexShrink:0}}>
                      <IC n="heart" s={19} f={favs.some(f=>(f.id||f.title)===(selItem.id||selItem.title))?'#E50914':'none'} c={favs.some(f=>(f.id||f.title)===(selItem.id||selItem.title))?'text-red-500':'text-gray-500'}/>
                    </button>
                  </div>

                  <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(260px,1fr))',gap:18}}>
                    <p style={{fontSize:14,color:'#9ca3af',lineHeight:1.7,margin:0}}>{selItem.description||selItem.plot||'Sin descripción disponible.'}</p>
                    <div style={{background:'#1c2230',borderRadius:16,padding:16,border:'1px solid rgba(255,255,255,.06)'}}>
                      {selItem.type==='series'?(
                        <>
                          <div style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:1,color:'#9ca3af',marginBottom:12,display:'flex',alignItems:'center',gap:6}}><IC n="film" s={13} c="text-red-500"/>Episodios</div>
                          {selItem.seasons.map((season,idx)=>(
                            <div key={idx} style={{borderBottom:'1px solid rgba(255,255,255,.06)',marginBottom:6,paddingBottom:6}}>
                              <button onClick={()=>setExpS(expS===idx?null:idx)} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',background:'transparent',border:'none',cursor:'pointer',color:'#d1d5db',padding:'6px 0',fontSize:13,fontWeight:700}}>
                                <span>Temp. {season.season_number} <span style={{color:'#6b7280',fontWeight:400}}>({season.episodes.length} ep.)</span></span>
                                <IC n={expS===idx?'chU':'chD'} s={14}/>
                              </button>
                              {expS===idx&&(
                                <div style={{maxHeight:240,overflowY:'auto',display:'flex',flexDirection:'column',gap:2,paddingTop:4}}>
                                  {season.episodes.map((ep,eI)=>(
                                    <button key={eI} onClick={()=>{setSelEp(ep);scrollRef.current?.scrollTo({top:0,behavior:'smooth'});}}
                                      style={{display:'flex',alignItems:'center',gap:7,padding:'8px 10px',borderRadius:9,cursor:'pointer',border:'none',textAlign:'left',background:selEp?.url===ep.url?'#E50914':'rgba(255,255,255,.04)',color:selEp?.url===ep.url?'#fff':'#9ca3af',fontSize:12,fontWeight:selEp?.url===ep.url?700:400,transition:'background .15s'}}>
                                      <IC n="play" s={10} f="currentColor"/><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{eI+1}. {ep.title}</span>
                                    </button>
                                  ))}
                                </div>
                              )}
                            </div>
                          ))}
                        </>
                      ):(
                        <>
                          <div style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:1,color:'#9ca3af',marginBottom:12,display:'flex',alignItems:'center',gap:6}}><IC n="star" s={13} c="text-yellow-400"/>Más títulos</div>
                          {data.movies.slice(0,5).map(rel=>(
                            <div key={rel.id||rel.title} onClick={()=>playItem(rel)} style={{display:'flex',gap:10,alignItems:'center',cursor:'pointer',padding:'6px 0',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                              <img src={rel.image||rel.poster} style={{width:48,height:32,objectFit:'cover',borderRadius:6,flexShrink:0,background:'#0d1117'}} alt=""/>
                              <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rel.title}</div><div style={{fontSize:11,color:'#6b7280'}}>Ver ahora</div></div>
                            </div>
                          ))}
                        </>
                      )}
                    </div>
                  </div>
                </div>
              )}
            </div>

          ):(
            /* ══════════════════════════════════
               CATÁLOGO / HOME
            ══════════════════════════════════ */
            <div ref={scrollRef} style={{flex:1,overflowY:'auto',display:'flex',flexDirection:'column'}}>

              {/* Barra búsqueda + tabs chips (móvil) */}
              <div style={{padding:'10px 12px',background:'rgba(13,17,23,.97)',backdropFilter:'blur(10px)',borderBottom:'1px solid rgba(255,255,255,.05)',flexShrink:0,position:'sticky',top:0,zIndex:20}}>
                <div style={{display:'flex',alignItems:'center',gap:8,background:'#1c2230',border:'1px solid rgba(255,255,255,.08)',borderRadius:12,padding:'9px 12px',marginBottom:8}}>
                  <IC n="search" s={15} c="text-gray-500"/>
                  <input type="text" value={search} onChange={e=>setSearch(e.target.value)} placeholder={`Buscar en ${tab==='home'?'todo':tab}...`} style={{flex:1,background:'transparent',border:'none',outline:'none',color:'#fff',fontSize:14,minWidth:0}}/>
                  {search&&<button onClick={()=>setSearch('')} style={{background:'transparent',border:'none',cursor:'pointer',color:'#6b7280',display:'flex',flexShrink:0}}><IC n="x" s={14}/></button>}
                </div>
                {/* Tabs chips — solo en móvil */}
                <div className="only-mobile" style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:2}}>
                  {TABS.map(t=>(
                    <button key={t.id} onClick={()=>goTab(t.id)} style={{display:'flex',alignItems:'center',gap:5,padding:'5px 11px',borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontWeight:700,flexShrink:0,background:tab===t.id?'#E50914':'rgba(255,255,255,.06)',color:tab===t.id?'#fff':'#9ca3af',transition:'all .15s',whiteSpace:'nowrap'}}>
                      <IC n={t.ic} s={13} f={tab===t.id&&t.id==='favorites'?'currentColor':'none'}/>{t.lb}
                    </button>
                  ))}
                </div>
              </div>

              <div style={{flex:1,padding:'0 0 80px'}}>
                {/* Hero — solo en desktop */}
                {tab==='home'&&!dSearch&&heroItem&&(
                  <div className="only-desktop" style={{display:'block'}}>
                    <HeroSection item={heroItem} onPlay={playItem} isFav={favs.some(f=>(f.id||f.title)===(heroItem.id||heroItem.title))} onToggleFav={toggleFav}/>
                  </div>
                )}

                <div style={{padding:'14px 12px 0'}}>
                  {/* Banner SmartTV */}
                  {tab==='home'&&!dSearch&&(
                    <div className="aUp" style={{background:'rgba(37,99,235,.08)',border:'1px solid rgba(37,99,235,.2)',borderRadius:14,padding:'12px 14px',display:'flex',alignItems:'center',gap:11,marginBottom:18}}>
                      <div style={{background:'rgba(37,99,235,.15)',borderRadius:9,padding:7,flexShrink:0}}><IC n="tv" s={19} c="text-blue-400"/></div>
                      <div><div style={{fontWeight:700,fontSize:13,marginBottom:2}}>📺 Disfrútalo en tu Smart TV</div><div style={{fontSize:12,color:'#9ca3af'}}>Usa <strong style={{color:'#60a5fa'}}>Smart View</strong> o "Transmitir" desde tu móvil.</div></div>
                    </div>
                  )}
                  {/* Continuar viendo */}
                  {contW.length>0&&(
                    <div style={{marginBottom:22}}>
                      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:11}}><span style={{width:3,height:16,background:'#E50914',borderRadius:2,display:'inline-block'}}/><span style={{fontSize:12,fontWeight:800,textTransform:'uppercase',letterSpacing:1,color:'#d1d5db'}}>Continuar Viendo</span></div>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))',gap:'8px 10px'}}>
                        {contW.map((item,i)=><Card key={i} item={item} onClick={playItem} isFav={favs.some(f=>(f.id||f.title)===(item.id||item.title))} onToggleFav={toggleFav} progress={prog[item.id||item.title]?.pct}/>)}
                      </div>
                    </div>
                  )}
                  {/* Título sección */}
                  {!dSearch&&(
                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:11}}>
                      <div style={{display:'flex',alignItems:'center',gap:7}}><span style={{width:3,height:16,background:'#E50914',borderRadius:2,display:'inline-block'}}/><span style={{fontSize:12,fontWeight:800,textTransform:'uppercase',letterSpacing:1,color:'#d1d5db'}}>{tab==='home'?'Tendencias':tab==='movies'?'Películas':tab==='series'?'Series':tab==='favorites'?'Tus Favoritos':'Contenido'}</span></div>
                      <span style={{fontSize:11,color:'#4b5563'}}>{displayItems.length}</span>
                    </div>
                  )}
                  {dSearch&&(
                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:11}}><span style={{width:3,height:16,background:'#3b82f6',borderRadius:2,display:'inline-block'}}/><span style={{fontSize:12,fontWeight:600,color:'#9ca3af'}}>Resultados para "<strong style={{color:'#fff'}}>{dSearch}</strong>" — {displayItems.length}</span></div>
                  )}
                  {/* Grid */}
                  {loading?(
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))',gap:'8px 10px'}}>
                      {Array.from({length:12}).map((_,i)=><Skel key={i}/>)}
                    </div>
                  ):displayItems.length===0?(
                    <div style={{textAlign:'center',padding:'50px 20px',color:'#4b5563',display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
                      <IC n="alert" s={40} c="text-gray-700"/>
                      <div style={{fontSize:15,fontWeight:600}}>{tab==='favorites'?'Sin favoritos aún':'Sin resultados'}</div>
                      <div style={{fontSize:12}}>{tab==='favorites'?'Toca ❤️ en cualquier contenido.':dSearch?'Prueba otro término.':''}</div>
                    </div>
                  ):(
                    <div className="aUp" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(110px,1fr))',gap:'8px 10px'}}>
                      {displayItems.map((item,i)=><Card key={i} item={item} onClick={playItem} isFav={favs.some(f=>(f.id||f.title)===(item.id||item.title))} onToggleFav={toggleFav} progress={prog[item.id||item.title]?.pct}/>)}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* ══ BOTTOM NAV MÓVIL ══ — Oculto cuando TV está en modo player */}
          {!(isTV&&tvView==='player')&&(
            <nav className="only-mobile" style={{flexShrink:0}}>
              <div className="pb-safe" style={{display:'flex',justifyContent:'space-around',alignItems:'center',padding:'7px 4px',background:'#080b10',borderTop:'1px solid rgba(255,255,255,.05)'}}>
                {TABS.map(t=>(
                  <button key={t.id} onClick={()=>goTab(t.id)} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'3px 10px',background:'transparent',border:'none',cursor:'pointer',color:tab===t.id?'#E50914':'#6b7280',transition:'color .15s',flexShrink:0}}>
                    <IC n={t.ic} s={21} f={tab===t.id&&t.id==='favorites'?'currentColor':'none'}/>
                    <span style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:.5}}>{t.lb}</span>
                  </button>
                ))}
              </div>
            </nav>
          )}

        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
