<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAGIS Tube Ultimate - Jorge</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Cinzel:wght@700&family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body { background-color: #0d1117; color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #161b22; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #E50914; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(229,9,20,0.6); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); opacity:0; } to { transform: translateX(0); opacity:1; } }
        @keyframes heartPop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes toastIn { from { transform: translateY(20px) translateX(-50%); opacity: 0; } to { transform: translateY(0) translateX(-50%); opacity: 1; } }
        @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }

        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-slide-up { animation: slideUp 0.6s ease-out; }
        .animate-slide-right { animation: slideInRight 0.35s cubic-bezier(0.16,1,0.3,1); }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
        .heart-pop { animation: heartPop 0.3s ease-in-out; }
        .animate-pulse { animation: pulse 2s ease-in-out infinite; }
        .shimmer { background: linear-gradient(90deg, #1c2230 25%, #243040 50%, #1c2230 75%); background-size: 1000px 100%; animation: shimmer 1.5s infinite; }

        .text-gold-gradient { background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .iframe-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: black; }
        .iframe-container iframe { width: 100%; height: 100%; border: 0; }
        .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-dark { background: rgba(0,0,0,0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .card-glow:hover { box-shadow: 0 8px 32px rgba(229,9,20,0.25), 0 0 0 1px rgba(229,9,20,0.2); }
        .progress-bar { height: 3px; background: linear-gradient(to right, #E50914, #ff4d4d); border-radius: 2px; }
        .live-dot { width: 8px; height: 8px; background: #E50914; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite; }

        button:focus, div[tabindex="0"]:focus, input:focus {
            outline: 2px solid #E50914;
            outline-offset: 2px;
        }

        .loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(to right, #E50914, #ff6b35); z-index: 9999; transition: width 0.3s ease; }

        /* Sidebar colapsable en desktop */
        .sidebar-label { transition: opacity 0.2s, width 0.2s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const envConfig = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
        const firebaseConfig = JSON.parse(envConfig);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'magis-tube-local';

        let db = null, auth = null, currentUser = null;
        
        if (Object.keys(firebaseConfig).length > 0) {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                onAuthStateChanged(auth, (user) => { currentUser = user; });
                signInAnonymously(auth).catch(e => console.warn("Modo offline:", e));
            } catch (e) { console.warn("Firebase error:", e); }
        }

        window.DB_API = {
            saveVisitor: async (name) => {
                if (!name) return;
                if (db && auth && currentUser) {
                    try {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'app_visitors'), { name, timestamp: serverTimestamp(), uid: currentUser.uid });
                        return;
                    } catch (e) { console.warn("Fallo Firebase, usando local."); }
                }
                try {
                    const localData = JSON.parse(localStorage.getItem('magis_local_visitors') || '[]');
                    const isDuplicate = localData.some(v => v.name === name && (Date.now()/1000 - (v.timestamp?.seconds || 0)) < 60);
                    if (!isDuplicate) {
                        localData.push({ name, timestamp: { seconds: Date.now() / 1000 }, uid: 'local-user' });
                        localStorage.setItem('magis_local_visitors', JSON.stringify(localData));
                    }
                } catch (e) {}
            },
            subscribeToVisitors: (callback) => {
                if (db) {
                    try {
                        const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'app_visitors'));
                        return onSnapshot(q, (snapshot) => {
                            const visitors = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            visitors.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                            callback(visitors);
                        }, () => loadLocal(callback));
                    } catch (e) { loadLocal(callback); }
                } else { loadLocal(callback); }
                return () => {};
            }
        };

        function loadLocal(callback) {
            try {
                const localData = JSON.parse(localStorage.getItem('magis_local_visitors') || '[]');
                localData.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                callback(localData);
            } catch(e) { callback([]); }
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        const safeStorage = {
            getItem: (key) => { try { return localStorage.getItem(key); } catch(e) { return null; } },
            setItem: (key, value) => { try { localStorage.setItem(key, value); } catch(e) {} }
        };

        const NTFY_TOPIC = 'magistube_jorge_avisos';
        const URLS = {
            TV: 'https://raw.githubusercontent.com/sejo48/retrom3u/refs/heads/main/listaoficial.m3u',
            SERIES: 'https://raw.githubusercontent.com/sejo48/jorgedrive/refs/heads/main/playlist.json',
            MOVIES: 'https://raw.githubusercontent.com/sejo48/peliculas/refs/heads/main/peliculas.json'
        };

        // --- TOAST ---
        const Toast = ({ message, type = 'info', onDone }) => {
            useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
            const colors = { info: 'bg-blue-600', success: 'bg-green-600', error: 'bg-red-600', fav: 'bg-pink-600' };
            return (
                <div style={{ animation: 'toastIn 0.3s ease-out', left: '50%', transform: 'translateX(-50%)' }}
                    className={`fixed bottom-24 md:bottom-8 z-[200] ${colors[type]||colors.info} text-white px-5 py-3 rounded-full text-sm font-bold shadow-2xl flex items-center gap-2 whitespace-nowrap`}>
                    {message}
                </div>
            );
        };

        // --- ICONO ---
        const Icon = ({ name, size = 24, className, fill = "none" }) => {
            const icons = {
                search: <path d="M21 21l-4.35-4.35m0 0a7.5 7.5 0 111.414-1.414 7.5 7.5 0 01-1.414 1.414z"/>,
                menu: <path d="M4 6h16M4 12h16M4 18h16"/>,
                x: <path d="M6 18L18 6M6 6l12 12"/>,
                tv: <path d="M6 20.25h12m-7.5-3v3m3-3v3m-10.125-3h17.25c.621 0 1.125-.504 1.125-1.125V4.875c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125z"/>,
                film: <path d="M19.82 2H4.18C2.97 2 2 2.97 2 4.18v15.64C2 21.03 2.97 22 4.18 22h15.64c1.21 0 2.18-.97 2.18-2.18V4.18C22 2.97 21.03 2 19.82 2zM7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 7h5M17 17h5"/>,
                play: <path d="M5 3l14 9-14 9V3z"/>,
                heart: <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>,
                arrowLeft: <path d="M19 12H5m7 7l-7-7 7-7"/>,
                alertCircle: <g><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></g>,
                chevronDown: <path d="M6 9l6 6 6-6"/>,
                chevronUp: <path d="M18 15l-6-6-6 6"/>,
                chevronRight: <path d="M9 18l6-6-6-6"/>,
                clapperboard: <g><path d="M20.2 6 3 11l-.9-2.4c-.5-1.1.2-2.3 1.3-2.8l3.2-1.4c1.1-.5 2.3.2 2.8 1.3l.9 2.4l7.9-3l2 4.5Z"/><path d="M4 11v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9"/></g>,
                external: <g><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></g>,
                lock: <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a7 7 0 00-14 0v2"/>,
                share: <g><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></g>,
                whatsapp: <path d="M17.498 14.382c-.301-.15-1.767-.867-2.04-.966-.273-.101-.473-.15-.673.15-.197.295-.771.964-.944 1.162-.175.195-.349.21-.646.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>,
                bell: <g><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></g>,
                users: <g><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></g>,
                crown: <g><path d="M11.562 3.266a.5.5 0 0 1 .876 0L15.39 8.87a1 1 0 0 0 1.516.294L21.183 5.5a.5.5 0 0 1 .798.519l-2.834 10.246a1 1 0 0 1-.956.734H5.81a1 1 0 0 1-.957-.734L2.02 6.02a.5.5 0 0 1 .798-.519l4.276 3.664a1 1 0 0 0 1.516-.294z"/></g>,
                refresh: <g><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"></path><path d="M16 21h5v-5"></path></g>,
                arrowUp: <path d="M12 19V5m-7 7l7-7 7 7"/>,
                star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>,
                home: <g><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></g>,
                clock: <g><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></g>,
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons.search}
                </svg>
            );
        };

        // --- NOMBRE MODAL ---
        const NameModal = ({ onSave }) => {
            const [name, setName] = useState('');
            const [error, setError] = useState(false);
            const hour = new Date().getHours();
            const greeting = hour < 12 ? '¡Buenos días!' : hour < 18 ? '¡Buenas tardes!' : '¡Buenas noches!';
            const handleSubmit = (e) => { e.preventDefault(); if (name.trim().length < 2) { setError(true); return; } onSave(name.trim()); };
            return (
                <div className="fixed inset-0 z-[100] bg-black/97 flex flex-col items-center justify-center p-4 animate-fade-in">
                    <div className="max-w-md w-full text-center">
                        <div className="mb-4 text-5xl">👋</div>
                        <h2 className="text-4xl font-black text-white mb-1">{greeting}</h2>
                        <p className="text-gray-400 mb-8 text-sm">Para entrar a <span className="text-[#E50914] font-bold">MAGIS Tube</span>, dinos cómo te llamas.</p>
                        <form onSubmit={handleSubmit}>
                            <input type="text" className="w-full bg-[#1c2230] border border-white/10 rounded-2xl px-6 py-4 text-xl text-white text-center focus:border-[#E50914] outline-none mb-3 transition-colors" placeholder="Tu nombre aquí..." value={name} onChange={(e) => { setName(e.target.value); setError(false); }} autoFocus />
                            {error && <p className="text-red-500 text-sm mb-4 animate-shake">⚠️ Por favor escribe un nombre válido.</p>}
                            <button type="submit" className="w-full bg-[#E50914] hover:bg-red-700 text-white font-black py-4 rounded-2xl transition-all shadow-lg shadow-red-900/40 text-lg tracking-wide">
                                ENTRAR →
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- USER LIST MODAL ---
        const UserListModal = ({ onClose }) => {
            const [users, setUsers] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                const unsub = window.DB_API?.subscribeToVisitors((data) => { setUsers(data); setLoading(false); });
                return () => unsub && unsub();
            }, []);
            return (
                <div className="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
                    <div className="bg-[#161b22] w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl border border-white/10" onClick={e => e.stopPropagation()}>
                        <div className="p-4 border-b border-white/5 flex justify-between items-center bg-gradient-to-r from-blue-900/30 to-transparent">
                            <h3 className="font-bold text-white flex items-center gap-2"><Icon name="users" size={18} className="text-blue-400"/> Libro de Visitas <span className="ml-1 bg-blue-500/20 text-blue-400 text-xs px-2 py-0.5 rounded-full">{users.length}</span></h3>
                            <button onClick={onClose} className="p-1 rounded-lg hover:bg-white/10"><Icon name="x" size={18} className="text-gray-400"/></button>
                        </div>
                        <div className="max-h-[60vh] overflow-y-auto custom-scrollbar">
                            {loading ? <div className="p-8 text-center text-gray-500">Cargando...</div>
                            : users.length === 0 ? <div className="p-8 text-center text-gray-500">Nadie ha firmado aún.</div>
                            : <table className="w-full text-sm">
                                <thead className="text-xs text-gray-500 uppercase bg-black/20"><tr><th className="px-4 py-2 text-left">Nombre</th><th className="px-4 py-2 text-right">Fecha</th></tr></thead>
                                <tbody className="divide-y divide-white/5">
                                    {users.map((u, i) => (
                                        <tr key={i} className="hover:bg-white/3">
                                            <td className="px-4 py-3 font-medium text-white flex items-center gap-2">
                                                <span className="w-7 h-7 rounded-full bg-gradient-to-tr from-[#E50914] to-orange-500 flex items-center justify-center text-xs font-black text-white">{u.name[0].toUpperCase()}</span>
                                                {u.name}
                                            </td>
                                            <td className="px-4 py-3 text-right text-gray-500 text-xs">{u.timestamp ? new Date(u.timestamp.seconds * 1000).toLocaleDateString('es-MX', {day:'numeric',month:'short'}) : 'Reciente'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>}
                        </div>
                    </div>
                </div>
            );
        };

        // --- ADMIN MODAL ---
        const AdminModal = ({ onClose, onSent }) => {
            const [title, setTitle] = useState('');
            const [message, setMessage] = useState('');
            const [type, setType] = useState('default');
            const [sending, setSending] = useState(false);
            const handleSend = async (e) => {
                e.preventDefault(); setSending(true);
                let tags = [];
                if (type === 'success') tags.push('success');
                if (type === 'alert') tags.push('warning');
                try {
                    await fetch(`https://ntfy.sh/${NTFY_TOPIC}?t=${Date.now()}`, { method: 'POST', body: message, headers: { 'Title': title, 'Tags': tags.join(',') } });
                    if(onSent) onSent();
                    alert('✅ Notificación enviada');
                    onClose();
                } catch(e) { alert('Error enviando'); } finally { setSending(false); }
            };
            return (
                <div className="fixed inset-0 z-[70] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
                    <div className="bg-[#161b22] p-6 rounded-2xl max-w-sm w-full border border-white/10 relative" onClick={e => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-500 hover:text-white"><Icon name="x" size={20}/></button>
                        <h3 className="text-lg font-black text-white mb-5 flex items-center gap-2"><Icon name="crown" size={20} className="text-yellow-400"/> Panel Admin</h3>
                        <form onSubmit={handleSend} className="space-y-3">
                            <div><label className="text-xs text-gray-500 mb-1 block uppercase tracking-wider">Título</label><input type="text" className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:border-[#E50914] outline-none" value={title} onChange={e => setTitle(e.target.value)} required /></div>
                            <div><label className="text-xs text-gray-500 mb-1 block uppercase tracking-wider">Mensaje</label><textarea className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:border-[#E50914] outline-none h-24 resize-none" value={message} onChange={e => setMessage(e.target.value)} required></textarea></div>
                            <div><label className="text-xs text-gray-500 mb-1 block uppercase tracking-wider">Tipo</label>
                                <select className="w-full bg-black/50 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none" value={type} onChange={e => setType(e.target.value)}>
                                    <option value="default">ℹ️ Información</option>
                                    <option value="success">✅ Novedad / Éxito</option>
                                    <option value="alert">⚠️ Alerta</option>
                                </select>
                            </div>
                            <button type="submit" disabled={sending} className="w-full bg-[#E50914] hover:bg-red-700 text-white font-black py-3 rounded-xl transition-colors disabled:opacity-50 text-sm tracking-wider">{sending ? 'Enviando...' : 'ENVIAR A TODOS'}</button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- LOCK SCREEN ---
        const LockScreen = ({ onUnlock, correctCode, onCancel }) => {
            const [input, setInput] = useState('');
            const [error, setError] = useState(false);
            const handleSubmit = (e) => { e.preventDefault(); if (input === String(correctCode)) onUnlock(); else { setError(true); setInput(''); } };
            return (
                <div className="absolute inset-0 z-50 bg-black/97 backdrop-blur-sm flex flex-col items-center justify-center p-4 animate-fade-in">
                    <div className="bg-[#161b22] p-8 rounded-2xl max-w-xs w-full text-center border border-white/10 shadow-2xl">

        // --- CARD ---
        const Card = ({ item, onClick, isFavorite, onToggleFavorite, progress }) => {

            return (
                <div tabIndex="0" onKeyDown={e=>{if(e.key==='Enter')onClick(item);}} className="group relative flex flex-col gap-2 cursor-pointer" onClick={()=>onClick(item)}>
                    <div className={`relative overflow-hidden rounded-xl bg-[#1c2230] shadow-lg transition-all duration-300 card-glow border border-white/4 group-hover:border-white/10 ${isTv?'aspect-video':'aspect-[2/3]'}`}>
                        <img src={item.image||item.poster||item.logo} className={`w-full h-full ${isTv?'object-contain p-3':'object-cover'} transition-transform duration-500 group-hover:scale-108`}
                            onError={e=>{e.target.onerror=null;e.target.src=`https://placehold.co/300x450/1c2230/ffffff?text=${(item.title||item.name||'?').charAt(0)}`;}} alt={item.title||item.name}/>
                        <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div className="bg-[#E50914] p-3 rounded-full shadow-lg shadow-red-900/50 transform scale-0 group-hover:scale-100 transition-transform duration-200">

                        {progress>0 && progress<100 && <div className="absolute bottom-0 left-0 w-full h-1 bg-gray-800"><div className="progress-bar" style={{width:`${progress}%`}}></div></div>}
                        <div className="absolute bottom-2 left-2 flex gap-1">
                            {isTv && <span className="bg-[#E50914] text-white text-[8px] font-black px-1.5 py-0.5 rounded-full shadow-sm">LIVE</span>}
                            {hasLock && <span className="bg-yellow-400 text-black text-[8px] font-black px-1.5 py-0.5 rounded-full flex items-center gap-0.5 shadow-sm"><Icon name="lock" size={7}/> PIN</span>}

        // --- SKELETON CARD ---
        const SkeletonCard = () => (
            <div className="flex flex-col gap-2">
                <div className="aspect-[2/3] rounded-xl shimmer"></div>
                <div className="h-3 w-3/4 rounded shimmer"></div>
            </div>
        );

        // --- APP PRINCIPAL ---
        const App = () => {
            const [showIntro, setShowIntro] = useState(true);
            const [showQR, setShowQR] = useState(false);
            const [showNotif, setShowNotif] = useState(false);
            const [showUserList, setShowUserList] = useState(false);
            const [showNameModal, setShowNameModal] = useState(false);
            const [showAdmin, setShowAdmin] = useState(false);
            const [showScrollTop, setShowScrollTop] = useState(false);
            const [userName, setUserName] = useState('');
            const [activeTab, setActiveTab] = useState('home');
            const [content, setContent] = useState({ tv: [], series: [], movies: [] });
            const [search, setSearch] = useState('');
            const [debouncedSearch, setDebouncedSearch] = useState('');
            const [notifications, setNotifications] = useState([]);
            const [notifLoading, setNotifLoading] = useState(true);
            const [unreadNotif, setUnreadNotif] = useState(0);
            const [lastReadTime, setLastReadTime] = useState(0);
            const [selectedItem, setSelectedItem] = useState(null);
            const [selectedEpisode, setSelectedEpisode] = useState(null);
            const [isLocked, setIsLocked] = useState(false);
            const [favorites, setFavorites] = useState([]);
            const [watchProgress, setWatchProgress] = useState({});
            const [loading, setLoading] = useState(true);
            const [loadProgress, setLoadProgress] = useState(0);
            const [expandedSeason, setExpandedSeason] = useState(0);
            const [toast, setToast] = useState(null);
            const videoRef = useRef(null);
            const hlsRef = useRef(null);
            const mainRef = useRef(null);

            const showToast = (message, type='info') => { setToast({message, type, id: Date.now()}); };

            // Debounce búsqueda
            useEffect(() => {
                const t = setTimeout(() => setDebouncedSearch(search), 300);
                return () => clearTimeout(t);
            }, [search]);

            // Scroll top button
            useEffect(() => {
                const el = mainRef.current;
                if (!el) return;
                const handler = () => setShowScrollTop(el.scrollTop > 400);
                el.addEventListener('scroll', handler);
                return () => el.removeEventListener('scroll', handler);
            }, []);

            const fetchNotifs = async () => {
                setNotifLoading(true);
                try {
                    const res = await fetch(`https://ntfy.sh/${NTFY_TOPIC}/json?poll=1&since=all&t=${Date.now()}`);
                    const text = await res.text();
                    const lines = text.trim().split('\n');
                    const parsed = lines.map((line, idx) => {
                        try {
                            const d = JSON.parse(line);
                            if(d.event !== 'message') return null;
                            let type = 'info';
                            if(d.tags){ if(d.tags.includes('warning')||d.tags.includes('error')) type='alert'; else if(d.tags.includes('success')||d.tags.includes('check')) type='success'; }
                            return { id: d.id||idx, date: new Date(d.time*1000).toLocaleDateString('es-MX',{day:'numeric',month:'short'}), title: d.title||'Aviso', message: d.message, type, time: d.time };
                        } catch(e){ return null; }
                    }).filter(Boolean).reverse();
                    setNotifications(parsed);
                    const lrt = parseInt(safeStorage.getItem('magis_last_read_notif') || '0');
                    const newCount = parsed.filter(n => n.time > lrt).length;
                    setUnreadNotif(newCount);
                } catch(e){ console.error(e); } finally { setNotifLoading(false); }
            };

            useEffect(() => { fetchNotifs(); }, []);

            const cleanDriveUrl = (url) => {
                if (!url) return '';
                if (url.includes('drive.google.com')) {
                    if (url.includes('/preview')) return url;
                    const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                    return match ? `https://drive.google.com/file/d/${match[1]}/preview` : url;
                }
                return url;
            };

            const shareViaWhatsApp = () => { window.open(`https://wa.me/?text=${encodeURIComponent('¡Mira esta app increíble! '+window.location.href)}`, '_blank'); };

            useEffect(() => {
                const init = async () => {
                    const savedName = safeStorage.getItem('magistube_username');
                    if(savedName){ setUserName(savedName); if(window.DB_API?.saveVisitor) window.DB_API.saveVisitor(savedName); }
                    try {
                        setLoading(true); setLoadProgress(20);
                        const [resTV, resSeries, resMovies] = await Promise.all([fetch(URLS.TV), fetch(URLS.SERIES), fetch(URLS.MOVIES)]);
                        setLoadProgress(60);
                        const textTV = await resTV.text();
                        const jsonSeries = await resSeries.json();
                        const jsonMovies = await resMovies.json();
                        setLoadProgress(80);
                        const tvChannels = parseM3U(textTV);
                        const seriesList = (Array.isArray(jsonSeries)?jsonSeries:[]).map(s=>({id:s.tituloSerie,title:s.tituloSerie||s.name,description:s.descripcion||s.description,image:s.imagen||s.image||s.poster,type:'series',codigo:s.codigo||s.password||s.pin||s.clave,seasons:(s.temporadas||[]).map(t=>({season_number:t.numeroTemporada||1,episodes:(t.episodios||[]).map(e=>({title:e.tituloEpisodio||e.title,url:cleanDriveUrl(e.urlDrive||e.url),image:s.imagen}))}))}));
                        const rawMovies = Array.isArray(jsonMovies)?jsonMovies:(jsonMovies.peliculas||[]);
                        const moviesList = rawMovies.map(m=>({...m,type:'movie',title:m.titulo||m.title,image:m.imagen||m.poster,codigo:m.codigo||m.password||m.pin,url:cleanDriveUrl(m.urlDrive||m.url)}));
                        setContent({tv:tvChannels,series:seriesList,movies:moviesList});
                        setLoadProgress(100);
                    } catch(err){ console.error(err); } finally { setLoading(false); setLoadProgress(0); }
                };
                const sf = safeStorage.getItem('magistube_favs'); if(sf) setFavorites(JSON.parse(sf));
                const sp = safeStorage.getItem('magistube_progress'); if(sp) setWatchProgress(JSON.parse(sp));
                setLastReadTime(parseInt(safeStorage.getItem('magis_last_read_notif')||'0'));
                init();
            }, []);

            const handleIntroFinish = () => {
                setShowIntro(false);
                if(!safeStorage.getItem('magistube_username')){ setShowNameModal(true); }
                else{ const n=safeStorage.getItem('magistube_username'); setUserName(n); if(window.DB_API?.saveVisitor) window.DB_API.saveVisitor(n); }
            };

            const handleSaveName = (name) => {
                safeStorage.setItem('magistube_username', name); setUserName(name); setShowNameModal(false);
                if(window.DB_API?.saveVisitor) window.DB_API.saveVisitor(name);
                showToast(`¡Bienvenido/a, ${name}! 👋`, 'success');
            };

            const parseM3U = (data) => {
                const lines = data.split('\n'); const channels = [];
                for(let i=0; i<lines.length; i++){
                    if(lines[i].trim().startsWith('#EXTINF:')){
                        const url = lines[i+1]?.trim();
                        if(url && url.startsWith('http')){
                            const info = lines[i];
                            channels.push({id:`tv-${i}`,title:info.split(',')[1]?.trim()||'Canal',image:info.match(/tvg-logo="([^"]*)"/)?.[1],group:info.match(/group-title="([^"]*)"/)?.[1]||'General',url,type:'tv'});
                        }
                    }
                }
                return channels;
            };

            const playUrl = (selectedItem?.type==='tv'||selectedItem?.type==='movie') ? selectedItem.url : (selectedItem?.type==='series'&&selectedEpisode) ? selectedEpisode.url : '';
            const isDriveLink = playUrl && playUrl.includes('drive.google.com');

            const handleVideoProgress = (e) => {
                const time=e.target.currentTime; const duration=e.target.duration;
                if(!duration||!selectedItem) return;
                const pct=(time/duration)*100;
                const itemId=selectedItem.id||selectedItem.title;
                const np={...watchProgress,[itemId]:{pct,time,item:selectedItem,timestamp:Date.now()}};
                setWatchProgress(np); safeStorage.setItem('magistube_progress',JSON.stringify(np));
            };

            useEffect(() => {
                if(isLocked||!playUrl||isDriveLink||!videoRef.current) return;
                const video=videoRef.current;
                if(hlsRef.current){hlsRef.current.destroy();hlsRef.current=null;}
                const itemId=selectedItem?.id||selectedItem?.title;
                const saved=watchProgress[itemId];
                const onMeta=()=>{ if(saved&&saved.time>0&&saved.pct<95) video.currentTime=saved.time; };
                video.addEventListener('loadedmetadata',onMeta);
                if(Hls.isSupported()&&(playUrl.includes('.m3u8')||selectedItem?.type==='tv')){
                    const hls=new Hls(); hlsRef.current=hls; hls.loadSource(playUrl); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().catch(()=>{}));
                } else { video.src=playUrl; video.load(); video.play().catch(()=>{}); }
                return () => video.removeEventListener('loadedmetadata',onMeta);
            }, [playUrl,isDriveLink,selectedItem,isLocked]);

            const toggleFavorite = (item) => {
                const itemId=item.id||item.title;
                const alreadyFav = favorites.some(f=>(f.id||f.title)===itemId);
                const nf = alreadyFav ? favorites.filter(f=>(f.id||f.title)!==itemId) : [item,...favorites];
                setFavorites(nf); safeStorage.setItem('magistube_favs',JSON.stringify(nf));
                showToast(alreadyFav?`❌ Quitado de favoritos`:`❤️ Guardado en favoritos`, 'fav');
            };

            const handlePlay = (item) => {
                const code=item.codigo||item.password||item.pin;
                setSelectedItem(item);
                setIsLocked(!!code);
                setExpandedSeason(0);
                if(item.type==='series'){ const fe=item.seasons?.[0]?.episodes?.[0]; setSelectedEpisode(fe||null); }
                if(item.type!=='tv'||window.innerWidth<1024) window.scrollTo({top:0,behavior:'smooth'});
            };

            const getDisplayContent = () => {
                let list = activeTab==='home' ? [...content.movies.slice(0,20),...content.series.slice(0,20),...content.tv.slice(0,20)]
                    : activeTab==='favorites' ? favorites
                    : content[activeTab]||[];
                if(debouncedSearch) return list.filter(i=>(i.title||i.name||'').toLowerCase().includes(debouncedSearch.toLowerCase()));
                return list;
            };

            const continueWatchingItems = useMemo(() => {
                if(activeTab!=='home'||debouncedSearch) return [];
                return Object.values(watchProgress).filter(p=>p.pct>1&&p.pct<95&&p.item).sort((a,b)=>b.timestamp-a.timestamp).slice(0,10).map(p=>p.item);
            }, [watchProgress,activeTab,debouncedSearch]);

            const displayedItems = getDisplayContent();
            const heroItem = useMemo(() => content.movies.length?content.movies[Math.floor(Math.random()*Math.min(content.movies.length,8))]:content.series[0], [content]);

            const markNotifsRead = () => {
                const now = Math.floor(Date.now()/1000);
                safeStorage.setItem('magis_last_read_notif', String(now));
                setLastReadTime(now); setUnreadNotif(0);
            };

            const tabConfig = [
                { id:'home', icon:'home', label:'Inicio' },
                { id:'series', icon:'film', label:'Series' },
                { id:'movies', icon:'clapperboard', label:'Cine' },
                { id:'tv', icon:'tv', label:'TV' },
                { id:'favorites', icon:'heart', label:'Favs' },
            ];

            if(showIntro) return <IntroScreen onEnter={handleIntroFinish}/>;

            return (
                <div className="min-h-screen bg-[#0d1117] text-white font-sans flex flex-col md:flex-row relative">
                    {/* Barra de carga */}
                    {loadProgress>0 && loadProgress<100 && <div className="loading-bar" style={{width:`${loadProgress}%`}}></div>}

                    {/* Toast */}
                    {toast && <Toast key={toast.id} message={toast.message} type={toast.type} onDone={()=>setToast(null)}/>}

                    {/* Sidebar Desktop */}
                    <aside className="hidden md:flex w-18 flex-col items-center py-5 bg-[#0a0e13] border-r border-white/5 fixed h-full z-50" style={{width:'68px'}}>
                        <div className="mb-8 p-2 bg-[#E50914] rounded-xl cursor-pointer shadow-lg shadow-red-900/30 hover:scale-110 transition-transform" onClick={()=>{setActiveTab('home');setSelectedItem(null);setIsLocked(false);}}>
                            <Icon name="play" size={22} fill="white" className="text-white"/>
                        </div>
                        <div className="flex flex-col gap-1 w-full px-2">
                            {tabConfig.map(tab=>(
                                <button key={tab.id} onClick={()=>{setActiveTab(tab.id);setSelectedItem(null);setSearch('');setIsLocked(false);}}

                                    <Icon name={tab.icon} size={20} fill={activeTab===tab.id&&tab.id==='favorites'?'currentColor':'none'}/>
                                    <span className="text-[9px] font-bold uppercase tracking-wider">{tab.label}</span>
                                </button>
                            ))}
                        </div>
                        <div className="mt-auto flex flex-col items-center gap-3 mb-4 w-full px-2">
                            <button onClick={()=>setShowUserList(true)} className="flex flex-col items-center gap-1 py-2 rounded-xl w-full text-gray-600 hover:text-gray-300 hover:bg-white/4 transition-all"><Icon name="users" size={20}/><span className="text-[9px] font-bold">Visitas</span></button>
                            <button onClick={()=>setShowAdmin(true)} className="p-2 text-yellow-500 hover:text-yellow-400 transition-colors" title="Admin"><Icon name="crown" size={18}/></button>
                            <button onClick={()=>{setShowNotif(true);}} className="relative p-2 text-gray-500 hover:text-white transition-colors">
                                <Icon name="bell" size={18}/>
                                {unreadNotif>0 && <span className="absolute -top-1 -right-0.5 w-4 h-4 bg-[#E50914] rounded-full text-[9px] font-black flex items-center justify-center">{unreadNotif}</span>}
                            </button>
                            <button onClick={()=>setShowQR(true)} className="p-2 text-blue-400 hover:text-blue-300 transition-colors" title="Compartir"><Icon name="share" size={18}/></button>
                            <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-[#E50914] to-orange-500 flex items-center justify-center font-black text-sm text-white border-2 border-white/15 shadow-lg">{userName?userName[0].toUpperCase():'J'}</div>
                        </div>
                    </aside>

                    {/* Header Mobile */}
                    <div className="md:hidden fixed top-0 w-full bg-[#0d1117]/95 backdrop-blur z-50 px-4 py-3 flex items-center justify-between border-b border-white/5">
                        <div className="flex items-center gap-2">
                            <div className="w-7 h-7 bg-[#E50914] rounded-lg flex items-center justify-center"><Icon name="play" size={14} fill="white"/></div>
                            <span className="font-black text-lg tracking-tighter"><span className="text-[#E50914]">MAGIS</span>Tube</span>
                        </div>
                        <div className="flex gap-2 items-center">
                            <button onClick={()=>setShowAdmin(true)} className="p-1.5 text-yellow-400"><Icon name="crown" size={20}/></button>
                            <button onClick={()=>setShowUserList(true)} className="p-1.5 text-gray-400"><Icon name="users" size={20}/></button>
                            <button onClick={()=>setShowNotif(true)} className="p-1.5 text-gray-400 relative">
                                <Icon name="bell" size={20}/>
                                {unreadNotif>0&&<span className="absolute -top-0.5 -right-0.5 w-3.5 h-3.5 bg-[#E50914] rounded-full text-[8px] font-black flex items-center justify-center">{unreadNotif}</span>}
                            </button>
                            <button onClick={shareViaWhatsApp} className="p-1.5 text-green-400"><Icon name="whatsapp" size={20}/></button>
                            <button onClick={()=>setShowQR(true)} className="p-1.5 text-blue-400"><Icon name="share" size={20}/></button>
                        </div>
                    </div>

                    {/* Bottom Nav Mobile */}
                    <div className="md:hidden fixed bottom-0 w-full bg-[#0a0e13] border-t border-white/5 z-50 flex justify-around py-2 pb-safe">
                        {tabConfig.map(tab=>(
                            <button key={tab.id} onClick={()=>{setActiveTab(tab.id);setSelectedItem(null);setIsLocked(false);}}
                                className={`flex flex-col items-center gap-1 px-4 py-1 rounded-xl transition-all ${activeTab===tab.id?'text-[#E50914]':'text-gray-600'}`}>
                                <Icon name={tab.icon} size={20} fill={activeTab===tab.id&&tab.id==='favorites'?'currentColor':'none'}/>
                                <span className="text-[9px] font-bold">{tab.label}</span>
                            </button>
                        ))}
                    </div>

                    {/* Modals */}
                    {showNameModal && <NameModal onSave={handleSaveName}/>}
                    {showUserList && <UserListModal onClose={()=>setShowUserList(false)}/>}
                    {showQR && <QRModal onClose={()=>setShowQR(false)}/>}
                    {showNotif && <NotificationsModal onClose={()=>setShowNotif(false)} items={notifications} loading={notifLoading} onRefresh={fetchNotifs} unreadCount={unreadNotif} onMarkRead={markNotifsRead}/>}

                                                <p className="text-sm">Toca el ❤️ en cualquier contenido para guardarlo aquí.</p>

                                if(selectedItem && selectedItem.type==='tv' && window.innerWidth < 1024){
                                    return (
                                        <div className="flex flex-col h-screen bg-black animate-fade-in">
                                            <div className="relative w-full" style={{aspectRatio:'16/9'}}>
                                                <button onClick={()=>setSelectedItem(null)} className="absolute top-3 left-3 z-30 glass-dark px-3 py-2 rounded-full text-white text-xs font-bold flex items-center gap-1">
                                                    <Icon name="arrowLeft" size={14}/> Lista
                                                </button>
                                                {isDriveLink
                                                    ? <div className="iframe-container"><iframe src={playUrl} allow="autoplay; encrypted-media; fullscreen" allowFullScreen></iframe></div>
                                                    : <video ref={videoRef} className="w-full h-full bg-black" controls autoPlay playsInline onTimeUpdate={handleVideoProgress}/>
                                                }
                                            </div>
                                            <div className="p-4 bg-[#161b22] border-b border-white/5 flex items-center gap-3">
                                                {selectedItem.image && <img src={selectedItem.image} className="w-10 h-7 object-contain rounded bg-black border border-white/10 flex-shrink-0"/>}
                                                <div>
                                                    <h2 className="text-sm font-black text-white">{selectedItem.title}</h2>
                                                    <div className="flex items-center gap-2 mt-0.5"><div className="live-dot"></div><span className="text-[10px] text-[#E50914] font-black">EN VIVO</span></div>
                                                </div>
                                                <button onClick={()=>toggleFavorite(selectedItem)} className="ml-auto p-2"><Icon name="heart" size={20} className={favorites.some(f=>f.id===selectedItem.id)?"text-[#E50914]":"text-gray-500"} fill={favorites.some(f=>f.id===selectedItem.id)?"#E50914":"none"}/></button>
                                            </div>
                                            <div className="flex-1 overflow-y-auto custom-scrollbar">
                                                {filteredTV.map(channel=>(
                                                    <TvListItem key={channel.id} channel={channel} isActive={selectedItem?.id===channel.id} isFavorite={favorites.some(f=>f.id===channel.id)} onToggleFavorite={toggleFavorite} onClick={handlePlay}/>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                }

                                // DESKTOP: layout de 2 columnas con reproductor SIEMPRE visible a la izquierda
                                return (
                                    <div className="flex h-screen overflow-hidden animate-fade-in" style={{height:'calc(100vh)'}}>

                                        {/* COLUMNA IZQUIERDA — Reproductor grande */}
                                        <div className="flex-1 flex flex-col bg-black min-w-0 h-full">

                                            {/* Reproductor */}
                                            <div className="relative bg-black flex-1 flex items-center justify-center overflow-hidden">
                                                {selectedItem && selectedItem.type==='tv' ? (
                                                    <>
                                                        {isDriveLink
                                                            ? <div className="iframe-container"><iframe src={playUrl} allow="autoplay; encrypted-media; fullscreen" allowFullScreen></iframe></div>
                                                            : <video ref={videoRef} className="w-full h-full object-contain" controls autoPlay playsInline onTimeUpdate={handleVideoProgress}/>
                                                        }
                                                        {/* Overlay info */}
                                                        <div className="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/90 to-transparent pointer-events-none">
                                                            <div className="flex items-center gap-3">
                                                                {selectedItem.image && <img src={selectedItem.image} className="w-12 h-8 object-contain bg-black/50 rounded border border-white/15"/>}
                                                                <div>
                                                                    <h2 className="text-lg font-black text-white drop-shadow-lg">{selectedItem.title}</h2>
                                                                    <div className="flex items-center gap-2">
                                                                        <div className="live-dot"></div>
                                                                        <span className="text-xs text-[#E50914] font-black tracking-widest">EN VIVO</span>
                                                                        <span className="text-xs text-gray-400">{selectedItem.group}</span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </>
                                                ) : (
                                                    /* Pantalla de bienvenida cuando no hay canal */

                                                        <div className="relative">
                                                            <div className="w-28 h-28 rounded-full bg-gradient-to-br from-[#E50914]/20 to-[#E50914]/5 border border-[#E50914]/20 flex items-center justify-center">
                                                                <Icon name="tv" size={52} className="text-[#E50914]/60"/>
                                                            </div>
                                                            <div className="absolute -top-1 -right-1 live-dot w-4 h-4"></div>

                                                        </div>
                                                        <div className="flex gap-6 text-center">
                                                            <div><div className="text-2xl font-black text-[#E50914]">{content.tv.length}</div><div className="text-xs text-gray-500">Canales</div></div>
                                                            <div><div className="text-2xl font-black text-yellow-400">{favorites.filter(f=>f.type==='tv').length}</div><div className="text-xs text-gray-500">Favoritos</div></div>
                                                        </div>
                                                        {/* Preview de los primeros canales favoritos */}
                                                        {favorites.filter(f=>f.type==='tv').length > 0 && (
                                                            <div className="mt-2">
                                                                <p className="text-xs text-gray-600 mb-3 uppercase tracking-widest">Tus favoritos</p>

                                                                    {favorites.filter(f=>f.type==='tv').slice(0,6).map(ch=>(

                                                                            {ch.image ? <img src={ch.image} className="w-14 h-9 object-contain" onError={e=>e.target.style.display='none'}/> : <Icon name="tv" size={24} className="text-gray-500"/>}

                                                                        </button>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                            {/* Header lista */}

                                                ))}
                                            </div>

                                        </div>
                                    </div>

                                                        <img src={selectedItem.image||selectedItem.poster} className="hidden md:block w-44 rounded-xl shadow-lg object-cover aspect-[2/3] border border-white/8" alt={selectedItem.title}/>

                                                                        <span>Temporada {season.season_number} <span className="text-xs text-gray-600 font-normal">({season.episodes.length} ep.)</span></span>
                                                                        {expandedSeason===idx?<Icon name="chevronUp" size={14}/>:<Icon name="chevronDown" size={14}/>}
                                                                    </button>
                                                                    {expandedSeason===idx && (
                                                                        <div className="flex flex-col gap-1 mt-1 pl-2 max-h-[350px] overflow-y-auto pr-1 custom-scrollbar">
                                                                            {season.episodes.length===0 && <p className="text-xs text-gray-600 p-2">Sin episodios.</p>}
                                                                            {season.episodes.map((ep,eIdx)=>(
                                                                                <div key={eIdx} onClick={()=>{setSelectedEpisode(ep);mainRef.current?.scrollTo({top:0,behavior:'smooth'});}}
                                                                                    className={`text-xs p-2.5 rounded-xl cursor-pointer flex items-center gap-2 transition-colors ${selectedEpisode?.url===ep.url?'bg-[#E50914] text-white font-bold':'text-gray-400 hover:bg-white/6 hover:text-white'}`}>
                                                                                    <Icon name="play" size={10} fill="currentColor" className="flex-shrink-0"/>
                                                                                    <span className="truncate">{eIdx+1}. {ep.title}</span>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    ) : (
                                                        <div>
                                                            <h3 className="font-black text-sm mb-4 text-gray-300 uppercase tracking-wider flex items-center gap-2"><Icon name="star" size={14} className="text-yellow-400"/> Recomendados</h3>
                                                            <div className="flex flex-col gap-3">
                                                                {content[selectedItem.type==='tv'?'tv':'movies'].slice(0,5).map(rel=>(
                                                                    <div key={rel.id||rel.title} onClick={()=>handlePlay(rel)} className="flex gap-3 cursor-pointer group items-center">
                                                                        <img src={rel.image||rel.poster} className="w-16 h-10 object-cover rounded-lg bg-gray-800 flex-shrink-0 border border-white/5"/>
                                                                        <div><h4 className="text-xs font-bold line-clamp-1 text-gray-300 group-hover:text-[#E50914] transition-colors">{rel.title}</h4><span className="text-[10px] text-gray-600">Ver ahora →</span></div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            }

                            // HOME / CATALOG
                            return (
                                <>
                                    <div className="sticky top-0 z-40 bg-[#0d1117]/95 backdrop-blur py-4 px-5 md:px-10 flex items-center justify-between border-b border-white/4">
                                        <div className="flex bg-[#1c2230] border border-white/8 rounded-xl px-4 py-2.5 w-full max-w-lg items-center focus-within:border-[#E50914]/60 transition-colors gap-3">
                                            <Icon name="search" className="text-gray-500 flex-shrink-0" size={16}/>
                                            <input type="text" placeholder={`Buscar en ${activeTab==='home'?'todo el catálogo':activeTab}...`} className="bg-transparent w-full outline-none text-sm placeholder-gray-600 text-white" value={search} onChange={e=>setSearch(e.target.value)}/>
                                            {search && <button onClick={()=>setSearch('')} className="text-gray-500 hover:text-white flex-shrink-0"><Icon name="x" size={14}/></button>}
                                        </div>
                                        {userName && <div className="hidden md:flex items-center gap-2 ml-5 bg-white/4 rounded-xl px-3 py-2 border border-white/5">
                                            <span className="text-xs text-gray-400">Hola,</span>
                                            <span className="text-xs font-black text-white">{userName}</span>
                                        </div>}
                                    </div>

                                    {activeTab==='home' && !debouncedSearch && heroItem && <HeroSection item={heroItem} onPlay={handlePlay} isFavorite={favorites.some(f=>(f.id||f.title)===(heroItem.id||heroItem.title))} onToggleFavorite={toggleFavorite}/>}

                                    <div className="p-4 md:p-10">
                                        {/* Smart TV Banner */}
                                        {activeTab==='home' && !debouncedSearch && (
                                            <div className="mb-8 p-4 rounded-2xl bg-gradient-to-r from-blue-900/30 to-transparent border border-blue-500/20 flex items-center gap-4 animate-fade-in">
                                                <div className="p-3 bg-blue-500/15 rounded-xl text-blue-400 flex-shrink-0"><Icon name="tv" size={22}/></div>
                                                <div>
                                                    <h3 className="text-white font-black text-sm">📺 Disfrútalo en tu Smart TV</h3>
                                                    <p className="text-gray-400 text-xs mt-0.5">Usa <strong className="text-blue-400">Smart View</strong> o "Transmitir" desde tu móvil para verlo en el televisor.</p>
                                                </div>
                                            </div>
                                        )}

                                        {/* Continuar viendo */}
                                        {activeTab==='home' && continueWatchingItems.length>0 && !debouncedSearch && (
                                            <div className="mb-10 animate-fade-in">
                                                <div className="mb-4 flex items-center gap-2">
                                                    <span className="w-1 h-5 bg-[#E50914] rounded-full"></span>
                                                    <h2 className="text-base font-black uppercase tracking-wider text-gray-200">Continuar Viendo</h2>
                                                </div>
                                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-4 gap-y-6">
                                                    {continueWatchingItems.map((item,i)=><Card key={`cw-${i}`} item={item} onClick={handlePlay} isFavorite={favorites.some(f=>(f.id||f.title)===(item.id||item.title))} onToggleFavorite={toggleFavorite} progress={watchProgress[item.id||item.title]?.pct}/>)}
                                                </div>
                                            </div>
                                        )}

                                        {/* Título sección */}
                                        {!debouncedSearch && (
                                            <div className="mb-6 flex items-center justify-between">
                                                <div className="flex items-center gap-2">
                                                    <span className="w-1 h-5 bg-[#E50914] rounded-full"></span>
                                                    <h2 className="text-base font-black uppercase tracking-wider text-gray-200">
                                                        {activeTab==='home'?'Tendencias':activeTab==='movies'?'Películas':activeTab==='series'?'Series':'Contenido'}
                                                    </h2>
                                                </div>
                                                <span className="text-xs text-gray-600">{displayedItems.length} títulos</span>
                                            </div>
                                        )}

                                        {/* Search header */}
                                        {debouncedSearch && (
                                            <div className="mb-6 flex items-center gap-2">
                                                <span className="w-1 h-5 bg-blue-500 rounded-full"></span>
                                                <h2 className="text-sm font-black text-gray-300">Resultados para "<span className="text-white">{debouncedSearch}</span>" — {displayedItems.length} encontrados</h2>
                                            </div>
                                        )}

                                        {loading ? (
                                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-4 gap-y-6">
                                                {Array.from({length:12}).map((_,i)=><SkeletonCard key={i}/>)}
                                            </div>
                                        ) : displayedItems.length===0 ? (
                                            <div className="text-center py-24 text-gray-600 flex flex-col items-center gap-4">
                                                <Icon name="alertCircle" size={52} className="opacity-15"/>
                                                <p className="text-lg font-semibold">Sin resultados</p>
                                                {debouncedSearch && <p className="text-sm">Prueba con otro término de búsqueda.</p>}
                                            </div>
                                        ) : (
                                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-4 gap-y-6 animate-slide-up">
                                                {displayedItems.map((item,i)=><Card key={i} item={item} onClick={handlePlay} isFavorite={favorites.some(f=>(f.id||f.title)===(item.id||item.title))} onToggleFavorite={toggleFavorite} progress={watchProgress[item.id||item.title]?.pct}/>)}
                                            </div>
                                        )}
                                    </div>
                                </>
                            );
                        })()}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
